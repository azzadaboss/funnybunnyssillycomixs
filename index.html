<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funny Bunny Comixs</title>
    <style>
        body {
            background: linear-gradient(to right, #FFAAFF, #FFD700);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            color: #333;
            text-align: center;
        }
        h1 {
            color: #FF69B4;
        }
        .add-comixs {
            background-color: #FF1493;
            color: white;
            padding: 15px 25px;
            font-size: 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .add-comixs:hover {
            background-color: #FF4500;
        }
        .yis-character {
            height: 200px;
        }
    </style>
</head>
<body>
    <h1>Welcome to Funny Bunny Comixs!</h1>
    <button class="add-comixs">ADD COMIXS!!!</button>
    <div>
        <img src="path_to_yis_character_image" alt="Yis Character" class="yis-character" />
        <p>Check out our sample comixs featuring Yis doing silly things!</p>
        <p>Stay tuned for more fun and adventure with Yis!</p>
    </div>
    <footer>
        <p>&copy; 2026 Funny Bunny Comixs</p>
    </footer>
</body>
</html>
