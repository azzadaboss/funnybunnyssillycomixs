<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funny Bunny's Silly Comixs</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #ffeb3b;
            color: #4a4a4a;
        }
        h1 {
            text-align: center;
            color: #d5006d;
        }
        .btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: #3f51b5;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 20px;
        }
        .comix-card {
            border: 2px solid #ff5722;
            border-radius: 10px;
            margin: 15px;
            padding: 15px;
            background-color: #fff;
            display: inline-block;
            width: 200px;
            text-align: center;
        }
        .partners {
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <h1>Welcome to Funny Bunny's Silly Comixs!</h1>
    <button class="btn" id="addComixsButton">ADD COMIXS</button>
    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" fill="#3f51b5" />
        <text x="50%" y="50%" alignment-baseline="middle" text-anchor="middle" fill="white" font-size="20">YIS</text>
    </svg>
    <div class="comixs">
        <div class="comix-card">😀 Comix 1</div>
        <div class="comix-card">😂 Comix 2</div>
        <div class="comix-card">😃 Comix 3</div>
        <div class="comix-card">🤪 Comix 4</div>
    </div>
    <div class="partners">
        <h2>Partners</h2>
        <p>Arion Weekly</p>
    </div>
    <div class="contact">
        <h2>Contact Us</h2>
        <p>Email: <a href="mailto:contact@funnybunny.com">contact@funnybunny.com</a></p>
    </div>
    <script>
        document.getElementById('addComixsButton').onclick = function() {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.click();
        };
    </script>
</body>
</html>
