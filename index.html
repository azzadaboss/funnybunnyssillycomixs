<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funny Bunny's Silly Comixs</title>
    <style>
        body {
            background: linear-gradient(to bottom, #ffcccb, #ffebcd);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            color: #333;
        }
        .comix-card {
            border: 2px solid #ff69b4;
            border-radius: 10px;
            padding: 10px;
            margin: 10px;
            background-color: #fff;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.2);
        }
        footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9em;
            color: #555;
        }
    </style>
    <script>
        function addComix() {
            alert('Comix Added! 🎉');
        }
    </script>
</head>
<body>
    <h1>Funny Bunny's Silly Comixs</h1>
    <button onclick="addComix()">ADD COMIXS!!!</button>
    <h2>Sample Comixs</h2>
    <div class="comix-cards">
        <div class="comix-card">YIS Goes Bananas</div>
        <div class="comix-card">YIS Jumps High</div>
        <div class="comix-card">YIS's Silly Face</div>
        <div class="comix-card">YIS & Friends</div>
    </div>
    <h2>SVG Drawing of YIS the Bunny</h2>
    <svg width="100" height="100">
        <!-- Bunny Body -->
        <ellipse cx="50" cy="70" rx="30" ry="20" fill="#ffcccb" />
        <!-- Bunny Eyes -->
        <circle cx="35" cy="65" r="5" fill="black" />
        <circle cx="65" cy="65" r="5" fill="black" />
        <!-- Bunny Ears -->
        <ellipse cx="35" cy="50" rx="8" ry="20" fill="pink" />
        <ellipse cx="65" cy="50" rx="8" ry="20" fill="pink" />
    </svg>
    <footer>
        Partner: Arion Weekly | Contact: <a href="mailto:funnybunnysillycomixs@outlook.com">funnybunnysillycomixs@outlook.com</a>
    </footer>
</body>
</html>
